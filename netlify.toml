[build]
command = "npx vite build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"

[[edge_functions]]
path = "/*"
function = "meta-handler"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "default-src 'self' https://*.supabase.co https://*.bolt.host; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.bolt.host https://connect.facebook.net https://www.googletagmanager.com https://www.facebook.com https://sdk.mercadopago.com https://http2.mlstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://http2.mlstatic.com; font-src 'self' https://fonts.gstatic.com https://http2.mlstatic.com; img-src 'self' data: blob: https://*.supabase.co https://images.pexels.com https://*.cloudfront.net https://*.bolt.host https://www.facebook.com https://http2.mlstatic.com https://*.mercadopago.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.bolt.host https://www.facebook.com https://*.mercadopago.com https://api.mercadopago.com https://events.mercadopago.com https://sdk.mercadopago.com https://http2.mlstatic.com; frame-src 'self' https://*.mercadopago.com https://sdk.mercadopago.com https://http2.mlstatic.com https://*.mlstatic.com; worker-src 'self' blob:;"